<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Connected – DeTea</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
      padding: 1.5rem;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 2rem;
      max-width: 360px;
    }
    .success { color: #0a66c2; }
    .error { color: #e74c3c; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #0a66c2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading" class="spinner"></div>
    <p id="message">Connecting to LinkedIn…</p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state'); // optional: Firebase uid for backend to associate token

      const messageEl = document.getElementById('message');
      const loadingEl = document.getElementById('loading');

      function showSuccess() {
        loadingEl.style.display = 'none';
        messageEl.innerHTML = 'LinkedIn connected successfully';
        messageEl.className = 'success';
      }

      function showError(msg) {
        loadingEl.style.display = 'none';
        messageEl.textContent = msg || 'Something went wrong. Please try again.';
        messageEl.className = 'error';
      }

      if (!code) {
        const error = params.get('error_description') || params.get('error') || 'Authorization code is missing.';
        showError(error);
        return;
      }

      const apiBase = window.location.origin;
      fetch(apiBase + '/api/linkedin/exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, state: state || null })
      })
        .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
        .then(function (_ref) {
          var ok = _ref.ok, data = _ref.data;
          if (ok && (data.success || data.linkedinConnected)) {
            showSuccess();
          } else {
            showError(data.error || data.message || 'Failed to connect LinkedIn.');
          }
        })
        .catch(function (err) {
          showError(err.message || 'Network error. Please try again.');
        });
    })();
  </script>
</body>
</html>
