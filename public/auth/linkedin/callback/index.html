<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Connected – Detea</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
      padding: 1.5rem;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 2rem;
      max-width: 360px;
    }
    .success { color: #0a66c2; }
    .error { color: #e74c3c; }
    .skeleton {
      position: relative;
      overflow: hidden;
      background: #1e1e1e;
      border-radius: 10px;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(30,30,30,0) 0%, rgba(42,42,42,0.9) 50%, rgba(30,30,30,0) 100%);
      transform: translateX(-100%);
      animation: shimmer 1.35s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .sk-line { height: 12px; width: 86%; margin: 10px auto 0; }
    .sk-line-2 { height: 12px; width: 68%; margin: 10px auto 0; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line-2"></div>
    </div>
    <p id="message"></p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state'); // optional: Firebase uid for backend to associate token

      const messageEl = document.getElementById('message');
      const loadingEl = document.getElementById('loading');

      function showSuccess() {
        loadingEl.style.display = 'none';
        messageEl.innerHTML = 'LinkedIn connected successfully';
        messageEl.className = 'success';
      }

      function showError(msg) {
        loadingEl.style.display = 'none';
        messageEl.textContent = msg || 'Something went wrong. Please try again.';
        messageEl.className = 'error';
      }

      if (!code) {
        const error = params.get('error_description') || params.get('error') || 'Authorization code is missing.';
        showError(error);
        return;
      }

      const apiBase = window.location.origin;
      fetch(apiBase + '/api/linkedin/exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, state: state || null })
      })
        .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
        .then(function (_ref) {
          var ok = _ref.ok, data = _ref.data;
          if (ok && (data.success || data.linkedinConnected)) {
            showSuccess();
          } else {
            showError(data.error || data.message || 'Failed to connect LinkedIn.');
          }
        })
        .catch(function (err) {
          showError(err.message || 'Network error. Please try again.');
        });
    })();
  </script>
</body>
</html>
