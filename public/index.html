<!DOCTYPE html>
<html>
<head>
  <title>Detea - Account Deletion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align:center; padding:40px; background:#121212; color:white;">

<h2>Detea – Official Account Deletion Page</h2>

<p>
Detea is an application developed and published by <b>Jamdagni Corporation</b>.
</p>

<p>Enter your registered email:</p>

<input type="email" id="email" placeholder="Enter your email" style="padding:10px; width:250px;">
<br><br>

<button onclick="submitRequest()" style="padding:10px 20px; background:#E91E63; color:white; border:none;">
Delete My Account
</button>

<p id="msg"></p>

<script>
function submitRequest() {
  const email = document.getElementById("email").value;

  if (!email) {
    document.getElementById("msg").innerText = "Please enter email";
    return;
  }

  document.getElementById("msg").innerText = "Request submitted!";
}
</script>

</body>
</html>
